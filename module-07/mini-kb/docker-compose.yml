services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mini-kb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minikb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minikb"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mini_kb_pgdata:/var/lib/postgresql/data

volumes:
  mini_kb_pgdata:
